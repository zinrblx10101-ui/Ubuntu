name: Tiny10-Test-Lab-VNC-Setup
on: workflow_dispatch

jobs:
  test-bench:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 1. Massive Space Cleanup
        run: |
          # Kick out the p!gs to get that 78GB+ space
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean && sudo apt-get autoremove -y
          df -h

      - name: ⚡ 2. Unlock KVM V12
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 🛠️ 3. Install QEMU & Tunnel
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils curl jq
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y

      - name: 📥 4. Download ISO
        run: curl -L -o tiny10.iso "https://archive.org/download/tiny-10_202301/tiny10%2023h1%20x64.iso"

      - name: 🏎️ 5. Launch Installer (VNC Mode)
        run: |
          # Create 30GB Hard Drive
          qemu-img create -f qcow2 tiny10-test.qcow2 30G
          
          # Start Tunnel on 5901 (VNC) so you can actually see the setup
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 5901 &
          
          sleep 10
          echo "--------------------------------------------------"
          echo "CONNECT WITH VNC VIEWER USING THIS ADDRESS:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "--------------------------------------------------"

          # Start QEMU
          # -device usb-tablet: Fixes the laggy cursor dot
          # -boot d: Forces it to boot from the ISO (Installer) first
          sudo qemu-system-x86_64 \
            -m 4G \
            -smp 2 \
            -enable-kvm \
            -cpu host \
            -drive file=tiny10-test.qcow2,format=qcow2 \
            -cdrom tiny10.iso \
            -boot d \
            -device usb-tablet \
            -vga virtio \
            -rtc base=localtime \
            -net nic,model=e1000 \
            -net user \
            -vnc :1 &

          # Keep-Alive
          while ps -p $(pgrep qemu) > /dev/null; do sleep 60; done

