name: Tiny10-V12-Lamborghini
on: workflow_dispatch

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Maximize Disk Space (The Heavy Cleaner)
        run: |
          echo "Cleaning out the p!gs..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean && sudo apt-get autoremove -y
          df -h # Check how much space we won!

      - name: ⚙️ 2. Unlock KVM V12 Engine
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 🛠️ 3. Install QEMU & Ngrok
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils curl jq
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y

      - name: 📥 4. Download Tiny10 Image
        run: |
          # Downloading the NTDEV Tiny10 23H1 x64 ISO
          curl -L -o tiny10.iso "https://archive.org/download/tiny-10_202301/tiny10%2023h1%20x64.iso"

      - name: 🏁 5. Create Disk & Start V12 VM
        run: |
          # Create a 30GB virtual hard drive (Plenty of room now!)
          qemu-img create -f qcow2 tiny10-main.qcow2 30G
          
          # Start the Ngrok Tunnel for RDP (Port 3389)
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 3389 &
          
          sleep 5
          echo "--------------------------------------------------"
          echo "🚀 CONNECT WITH WINDOWS APP (RDP) USING THIS ADDRESS:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "--------------------------------------------------"

          # BOOT THE LAMBORGHINI
          # -rtc base=localtime: Fixes the clock
          # -vga virtio: High-speed graphics
          # -net user,hostfwd=tcp::3389-:3389: For the Windows App (RDP)
          sudo qemu-system-x86_64 \
            -m 4G \
            -smp 2 \
            -enable-kvm \
            -cpu host \
            -drive file=tiny10-main.qcow2,format=qcow2 \
            -cdrom tiny10.iso \
            -vga virtio \
            -rtc base=localtime \
            -net nic,model=e1000 \
            -net user,hostfwd=tcp::3389-:3389 \
            -vnc :1 # Backup VNC port 5901 if RDP fails

